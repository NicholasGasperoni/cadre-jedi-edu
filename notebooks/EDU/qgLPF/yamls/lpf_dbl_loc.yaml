time window:
  begin: &date_bgn 2009-12-30T18:00:00Z
  length: PT12H

geometry:
  nx: 40
  ny: 20 
  depths: [4000.0, 6000.0]

background:
  members from template:
    template:
      states:
      - date: &date_mid 2009-12-31T00:00:00Z
        filename: /home/nonroot/shared/EDU/qgstart/output/bg/bkgd.ens.%mem%.2009-12-30T00:00:00Z.P1D.nc
    pattern: %mem%
    nmembers: 20                       # Number of ensemble members to analyze

observations:
  observers:
  - obs operator:
      obs type: Stream
    obs space:
      obsdatain:
        obsfile: /home/nonroot/shared/EDU/qgstart/output/obs/truth_oneob.obs3d.nc
      obsdataout:
        obsfile: qgLPF/output/exp_dbl_loc/plots/lpf_oneob.obs3d.nc
      obs type: Stream
    obs error:
      covariance model: diagonal        # Obs errors genetally considered uncorrelated in R
    obs localizations:                  # Localization is handled in observation space              
    - lengthscale: 8.0e6                # Note no vertical localization is applied 
                       
driver:
  update obs config with geometry info: false
  save prior mean: true                 # Save the ensemble mean background/prior if true
  save posterior mean: true             # Save the ensemble mean analysis/posterior if true
  save posterior mean increment: true   # Save the ensemble mean analysis increments if true

local ensemble DA: 
  solver: PF  # Controls which flavor of ensemble solver is used
  inflation:    # Covariance inflation (applied after LETKF update)
    mult: 1.0   # Multiplicative inflation factor
  pf frac neff: 0.1
  pf kddm: 0
  pf maxiter: 1
  
output: # Controls output of different ensemble member analyses
  states:  
  - datadir: qgLPF/output/exp_dbl_loc/da
    date: *date_mid
    exp: lpf.%{member}%
    type: an
  
output increment: # Controls output of ensemble mean analysis increments
  datadir: qgLPF/output/exp_dbl_loc/da
  exp: lpf_meaninc
  date: *date_mid
  type: an

output mean prior: # Controls output of ensemble mean background
  datadir: qgLPF/output/exp_dbl_loc/da
  exp: lpf_meanprior
  date: *date_mid
  type: an
