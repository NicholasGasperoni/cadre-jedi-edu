window begin: &date_bgn @DATE_BGN
window length: PT12H

geometry:
  nx: 40
  ny: 20
  depths: [4000.0, 6000.0]

# update (and use for H(x) state at 00Z
background:
  members from template:
    template:
      states:
      - date: &date_mid @DATE_ANL
        filename: @BACKGROUND_FILE 
    pattern: %mem%
    nmembers: 20

observations:
  observers:
  - obs operator:
      obs type: Stream
    obs space:
      obsdatain:
        engine:
          obsfile: qgstart/output/obs/truth_cyc@CYC.obs3d.nc
      obsdataout:
        engine:
          obsfile: qgcycling/output/exp_letkf_noinf/obs/letkf_cyc@CYC.obs3d.nc
      obs type: Stream
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Heaviside 
      lengthscale: 2.0e6

driver:
  update obs config with geometry info: false
  save prior mean: true
  save posterior mean: true
  save posterior mean increment: true

local ensemble DA:
  solver: LETKF
  inflation:
    rtpp: 0.0
    mult: 1.0

output:
  states:
  - datadir: qgcycling/output/exp_letkf_noinf/da
    date: *date_mid
    exp: letkf.%{member}%
    type: an
  
output increment:
  datadir: qgcycling/output/exp_letkf_noinf/da
  exp: letkf_meaninc
  date: *date_mid
  type: an

output mean prior:
  datadir: qgcycling/output/exp_letkf_noinf/da
  exp: letkf_meanprior
  date: *date_mid
  type: an
